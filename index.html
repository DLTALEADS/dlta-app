<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a38;
  --accent: #2563eb; --green: #16a34a; --red: #dc2626; --yellow: #d97706;
  --text: #f1f1f3; --muted: #8888aa;
}
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }

.search-row { display: flex; gap: 8px; margin-bottom: 8px; }

.search-input::placeholder { color: var(--muted); }
.lookup-btn { background: var(--accent); border: none; border-radius: 10px; padding: 9px 14px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.source-picker { display: flex; gap: 4px; background: #1A1A1C; border: 1px solid #2A2A2D; border-radius: 12px; padding: 4px; margin-bottom: 8px; }
.source-seg { flex: 1; text-align: center; padding: 7px 10px; border-radius: 9px; font-size: 13px; font-weight: 700; color: #8A8A8E; background: transparent; border: none; cursor: pointer; font-family: inherit; white-space: nowrap; transition: background 0.15s, color 0.15s; }
.source-seg.active { background: #2D6BFF; color: #fff; }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }

.list { padding: 12px 16px 100px; }
.count-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

.lead-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.lead-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.lead-footer { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.status-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.pill-new { background: #0f1a35; color: var(--accent); border: 1px solid var(--accent); }
.pill-called { background: #1a1a1a; color: #666; border: 1px solid #333; }
.pill-callback { background: #1a1200; color: var(--yellow); border: 1px solid var(--yellow); }
.pill-appointment { background: #0a1f0a; color: var(--green); border: 1px solid var(--green); }
.pill-notinterested { background: #1a1a1a; color: #555; border: 1px solid #333; }

.ph-call { background: var(--green); }
.ph-sms { background: var(--accent); }
.dnc-badge { font-size: 10px; font-weight: 800; color: #f87171; background: #7f1d1d; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
.best-row { display: flex; gap: 8px; }
.best-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 16px; font-weight: 700; outline: none; font-family: inherit; }
.best-call { width: 46px; height: 46px; background: var(--green); border: none; border-radius: 10px; font-size: 22px; cursor: pointer; }
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.status-opt { padding: 12px 6px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; line-height: 1.4; }
.sel-new { border-color: var(--accent); color: var(--accent); background: #0f1a35; }

.dl-stat-num.red { color: #FF453A; }
.dl-stat-num.orange { color: #FF9F0A; }
.dl-stat-cap { font-size: 10px; color: #8A8A8E; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.dl-bar-row { margin-bottom: 12px; }

<body>

<div id="listView">
  <div class="header">
    <div class="header-top">
      <div class="logo">DL<span>T</span>A</div>
      <div class="stats"><b id="calledCount">0</b> worked · <b id="totalCount">0</b> total</div>
    </div>
    <div class="source-picker" id="sourcePicker"></div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Search name, address, zip..." oninput="renderList()">
      <button class="lookup-btn" onclick="openLookup()">📞 Lookup</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="tabs" id="tabBar" style="flex:1;margin-bottom:0"></div>
      <button id="sortBtn" onclick="toggleSaleSort()" style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">🔨 Sale Date</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="list">
    <div class="count-label" id="countLabel"></div>
    <div id="leadList"><div class="loading"><div class="spinner"></div><div>Loading leads...</div></div></div>
  </div>
</div>

<div class="detail" id="detailView">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div style="font-size:14px;color:var(--muted)" id="detailNav"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="modal" id="lookupModal">
  <div class="modal-box">
    <div class="modal-title">📞 Inbound Lookup</div>
    <input class="field-input" id="lookupInput" type="tel" placeholder="Enter phone number..." oninput="doLookup()">
    <div id="lookupResult" style="margin-top:16px"></div>
    <button class="modal-close" onclick="closeLookup()">Close</button>
  </div>
</div>

<!-- Canned text template dropdown: anchored to the lead's Text button -->
<div class="tmpl-backdrop" id="tmplBackdrop" onclick="closeTextMenu()"></div>
<div class="tmpl-menu" id="tmplMenu"></div>

<!-- Activity screen: real numbers only, computed from the loaded leads array via DLTA.adapter -->
<div class="dl-screen" id="activityScreen">
  <div class="dl-screen-header">
    <div class="dl-screen-title">Activity</div>
    <div class="dl-screen-sub">Live from your loaded leads</div>
  </div>
  <div class="dl-body" id="activityBody"></div>
</div>

<!-- Goals screen: income and conversion math -->
<div class="dl-screen" id="goalsScreen">
  <div class="dl-screen-header">
    <div class="dl-screen-title">Goals</div>
    <div class="dl-screen-sub">Income math and dials per day needed</div>
  </div>
  <div class="dl-body" id="goalsBody"></div>
</div>

<!-- Bottom tab bar: show/hide screen divs, no router -->
<div class="dl-bottom-nav">
  <button class="dl-nav-btn active" id="navLeads" onclick="showTab('leads')"><span class="dl-nav-ico">📋</span>Leads</button>
  <button class="dl-nav-btn" id="navActivity" onclick="showTab('activity')"><span class="dl-nav-ico">📊</span>Activity</button>
  <button class="dl-nav-btn" id="navGoals" onclick="showTab('goals')"><span class="dl-nav-ico">🎯</span>Goals</button>
</div>

<script>
var leads = [];
var activeTab = 'all';
var currentId = null;
var saving = false;
var tmplPhone = '';

// Approved canned SMS templates grouped by situation. resolveTemplate fills
// {agent_name}, {company_name}, {first_name} (owner_name first word), and
// {address} (address_street) at selection time.
var TEMPLATES = [
  {
    category: 'Notice of Sale',
    messages: [
      'Hi, this is {agent_name} with {company_name}. If you received a Notice of Sale, it helps to first confirm the sale date and case details before deciding next steps.',
      'A notice of sale does not always mean every option is gone. Confirm the date and case details before making decisions.',
      'Do you know the scheduled sale date for the property? That date is the first thing to verify.'
    ]
  },
  {
    category: 'Lis Pendens',
    messages: [
      'Hi, this is {agent_name} with {company_name}. Lis pendens usually means a pending court case may affect the property. Do you have the case number?',
      'If lis pendens appears on title, the next step is to identify the lawsuit behind it.',
      'Can you share the property address and any court or recording information listed on the lis pendens notice?'
    ]
  },
  {
    category: 'Probate',
    messages: [
      'Hi, this is {agent_name} with {company_name}. If the property is part of an estate, we can help you identify which documents are needed to understand next steps.',
      'For probate property, the key question is who has authority to act for the estate.',
      'Do you have letters of office, a will, or any probate court paperwork for the property?'
    ]
  },
  {
    category: 'Short Sale',
    messages: [
      'Hi, this is {agent_name} with {company_name}. A short sale may be possible when the mortgage balance is higher than the sale price, but lender approval is required.',
      'Do you know the current loan balance and estimated property value? Those are key short sale details.',
      'If there is a foreclosure case, the court timeline matters for any short sale plan.'
    ]
  }
];

var DOT = { new:'dot-new', called:'dot-called', callback:'dot-callback', appointment:'dot-appointment', notinterested:'dot-notinterested', dnc:'dot-dnc', listed:'dot-listed' };
var PILL = { new:'pill-new', called:'pill-called', callback:'pill-callback', appointment:'pill-appointment', notinterested:'pill-notinterested', dnc:'pill-dnc', listed:'pill-listed' };
var PILL_LABEL = { new:'New', called:'Called', callback:'Callback', appointment:'Appt Set', notinterested:'Not Int.', dnc:'DNC', listed:'Listed' };
var TABS = [
  { key:'all', label:'All' },
  { key:'nos', label:'🔨 NOS' },
  { key:'lp', label:'⚖️ LP' },
  { key:'new', label:'🔵 New' },
  { key:'callback', label:'🔁 Callbacks' },
  { key:'appointment', label:'📅 Appts' },
  { key:'called', label:'📞 Called' },
  { key:'listed', label:'🏠 Listed' }
];
var sortMode = 'default';
var STATUSES = [
  {key:'new',label:'🔵 New'},
  {key:'called',label:'📞 Called'},
  {key:'callback',label:'🔁 Callback'},
  {key:'appointment',label:'📅 Appt Set'},
  {key:'notinterested',label:'👎 Not Int.'},
  {key:'dnc',label:'🚫 DNC'},
  {key:'listed',label:'🏠 Listed'}
];

function normalizeStatus(raw) {
  if (!raw) return 'new';
  var s = String(raw).toLowerCase().trim();
  if (s === 'new' || s === 'not called' || s === '') return 'new';
  if (s === 'called' || s === 'contacted') return 'called';
  if (s === 'callback' || s === 'call back' || s === 'follow up') return 'callback';
  if (s === 'appointment' || s === 'appt set' || s === 'appt') return 'appointment';
  if (s === 'notinterested' || s === 'not interested' || s === 'not int') return 'notinterested';
  if (s === 'dnc' || s === 'do not call') return 'dnc';
  if (s === 'listed') return 'listed';
  return 'new';
}

// API key baked in - no gate needed

function sourceLabel(id) {
  for (var i = 0; i < SOURCES.length; i++) { if (SOURCES[i].id === id) return SOURCES[i].label; }
  return id;
}

function showError(msg) {
  document.getElementById('leadList').innerHTML =
    '<div class="error-box"><h3>⚠️ Could Not Load Leads</h3><p>' + msg + '</p><button class="retry-btn" onclick="loadLeads()">Retry</button></div>';
}

// Clean empty state for a source that loaded fine but has no leads. Distinct
// from showError so a valid-but-empty tab does not read as a failure.
function showEmpty(msg) {
  document.getElementById('countLabel').textContent = '0 leads';
  document.getElementById('calledCount').textContent = '0';
  document.getElementById('totalCount').textContent = '0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('leadList').innerHTML =
    '<div class="empty">📭<br>' + msg + '</div>';
}

function loadLeads() {
  document.getElementById('leadList').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading leads...</div></div>';
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(currentSource) + '?key=' + API_KEY;
  fetch(url)
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error.message); });
      return r.json();
    })
    .then(function(data) {
      var rows = data.values || [];
      if (rows.length < 2) { showEmpty('No leads found in “' + sourceLabel(currentSource) + '.” This source is empty.'); return; }
      var headers = rows[0];
      leads = [];
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        var r = {};
        for (var j = 0; j < headers.length; j++) {
          r[headers[j]] = row[j] !== undefined ? row[j] : '';
        }

        // ── PHONE PARSING - matches confirmed 45-column schema ──
        // Schema: phone_1, phone_1_contact, phone_1_type, phone_1_dnc  (×5)
        var phones = [];
        for (var j = 1; j <= 5; j++) {
          var num = String(r['phone_' + j] || '').trim().replace(/\.0$/, '');
          var dnc = String(r['phone_' + j + '_dnc'] || '').toLowerCase() === 'true';
          var contact = String(r['phone_' + j + '_contact'] || '').trim();
          var type = String(r['phone_' + j + '_type'] || '').trim();
          if (num && num !== '0') phones.push({ number: num, dnc: dnc, contact: contact, type: type });
        }

        leads.push({
          row: i + 1,
          name: String(r.owner_name || 'Unknown Owner').trim(),
          address: String(r.address_street || r.address_full || ''),
          city: String(r.address_city || r.city || ''),
          state: String(r.address_state || r.state || ''),
          zip: String(r.address_zip || r.zip || ''),
          phones: phones,
          phone1: String(r.phone_1 || '').trim().replace(/\.0$/, ''),
          status: normalizeStatus(r.lead_status || r.call_status),
          notes: String(r.notes || ''),
          bestPhone: String(r.best_phone_number || ''),
          followUp: String(r.follow_up_date || '').split('T')[0],
          nextAction: String(r.next_action || ''),
          source: String(r.source || ''),
          leadType: String(r.lead_type || ''),
          textSent: String(r.text_sent || '').toLowerCase() === 'true',
          textSentTimestamp: String(r.text_sent_timestamp || ''),
          // sale_date / publish_date / min_bid: present if scraper ran, blank if not
          saleDate: String(r.sale_date || ''),
          publishDate: String(r.publish_date || ''),
          minBid: String(r.min_bid || ''),
          leadCategory: String(r.lead_type || '').toUpperCase()
        });
      }
      renderTabs();
      renderList();
    })
    .catch(function(err) {
      showError(err.message || 'Failed to load. Check API key and make sure the Sheet is shared publicly (View access).');
    });
}

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHDX2GDqaGggMrXRSRntfBlsTCiOtRe1IHsEcSX2kr7XjagcE5IQJSZ1KPbJzFEc5-/exec';

function saveToSheet(row, updates) {
  var params = new URLSearchParams();
  params.append('action', 'update');
  params.append('row', row);
  params.append('updates', JSON.stringify(updates));
  // Name the tab the user is reading so every write lands on the same source.
  // _row values come from currentSource's read, so the write must match it.
  params.append('sheet', currentSource);
  fetch(APPS_SCRIPT_URL + '?' + params.toString())
    .catch(function(e) { console.error('Save error:', e); });
}

function fmt(num) {
  var d = String(num).replace(/\D/g, '');
  if (d.length < 10) return num;
  return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6,10);
}

function renderTabs() {
  var html = '';
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    html += '<div class="tab ' + (activeTab === t.key ? 'active' : '') + '" onclick="setTab(\'' + t.key + '\')">' + t.label + '</div>';
  }
  document.getElementById('tabBar').innerHTML = html;
}

function setTab(key) { activeTab = key; renderTabs(); renderList(); }

function renderSourcePicker() {
  var html = '';
  for (var i = 0; i < SOURCES.length; i++) {
    var s = SOURCES[i];
    html += '<button class="source-seg ' + (currentSource === s.id ? 'active' : '') +
      '" onclick="setSource(\'' + s.id + '\')">' + s.label + '</button>';
  }
  document.getElementById('sourcePicker').innerHTML = html;
}

function setSource(id) {
  if (id === currentSource) return;
  currentSource = id;
  // Drop the old queue so no stale leads/_row values survive the switch, and
  // send the dialer back to the top of the (about-to-load) new queue.
  leads = [];
  currentId = null;
  closeDetail();
  activeTab = 'all';
  renderSourcePicker();
  // loadLeads() reads currentSource; all writes now also carry currentSource.
  loadLeads();
}

function toggleSaleSort() {
  sortMode = sortMode === 'saledate' ? 'default' : 'saledate';
  renderList();
  var btn = document.getElementById('sortBtn');
  if (btn) btn.style.background = sortMode === 'saledate' ? 'var(--red)' : 'var(--card)';
}

function renderList() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = [];
  for (var i = 0; i < leads.length; i++) {
    var l = leads[i];
    if (activeTab === 'nos' && l.leadCategory !== 'NOS') continue;
    if (activeTab === 'lp' && l.leadCategory !== 'LP') continue;
    if (activeTab !== 'all' && activeTab !== 'nos' && activeTab !== 'lp' && l.status !== activeTab) continue;
    if (q) {
      var hay = (l.name + ' ' + l.address + ' ' + l.city + ' ' + l.zip).toLowerCase();
      var phoneStr = '';
      for (var j = 0; j < l.phones.length; j++) phoneStr += l.phones[j].number + ' ';
      if (hay.indexOf(q) === -1 && phoneStr.indexOf(q) === -1) continue;
    }
    filtered.push(l);
  }
  var worked = 0;
  for (var i = 0; i < leads.length; i++) { if (leads[i].status !== 'new') worked++; }
  var pct = leads.length ? Math.round(worked / leads.length * 100) : 0;
  document.getElementById('calledCount').textContent = worked;
  document.getElementById('totalCount').textContent = leads.length;
  document.getElementById('progressFill').style.width = pct + '%';
  if (sortMode === 'saledate') {
    filtered.sort(function(a, b) {
      var parseDate = function(d) {
        if (!d) return 99999999;
        var p = d.split('/');
        return p.length === 3 ? parseInt(p[2]+p[0]+p[1]) : 99999999;
      };
      return parseDate(a.saleDate) - parseDate(b.saleDate);
    });
  }
  document.getElementById('countLabel').textContent = filtered.length + ' lead' + (filtered.length !== 1 ? 's' : '');
  if (!filtered.length) {
    document.getElementById('leadList').innerHTML = '<div class="empty">No leads found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var l = filtered[i];
    var chips = '';
    for (var j = 0; j < l.phones.length; j++) {
      var p = l.phones[j];
      chips += '<span class="chip ' + (p.dnc ? 'dnc' : '') + '">' + fmt(p.number) + '</span>';
    }
    var fu = l.followUp ? '<span class="followup-tag">📅 ' + l.followUp + '</span>' : '';
    var auctionTag = '';
    if (l.saleDate) {
      var saleParts = l.saleDate.split('/');
      var saleTs = saleParts.length === 3 ? new Date(saleParts[2], saleParts[0]-1, saleParts[1]).getTime() : 0;
      var daysOut = saleTs ? Math.ceil((saleTs - Date.now()) / 86400000) : 999;
      var tagClass = daysOut <= 14 ? 'auction-tag soon' : 'auction-tag';
      auctionTag = '<span class="' + tagClass + '">🔨 ' + l.saleDate + (daysOut <= 14 ? ' (' + daysOut + 'd)' : '') + '</span>';
    }
    var textTag = l.textSent ? '<span class="text-sent-tag">💬 Texted</span>' : '';
    var dimmed = l.status === 'notinterested' || l.status === 'dnc';
    html += '<div class="lead-card ' + (dimmed ? 'dimmed' : '') + '" onclick="openDetail(' + l.row + ')">';
    html += '<div class="lead-name"><div class="dot ' + (DOT[l.status] || 'dot-new') + '"></div>' + l.name + '</div>';
    html += '<div class="lead-meta">' + l.address + ', ' + l.city + ' ' + l.zip + '</div>';
    html += '<div class="lead-footer"><span class="status-pill ' + (PILL[l.status] || 'pill-new') + '">' + (PILL_LABEL[l.status] || 'New') + '</span>' + chips + fu + auctionTag + textTag + '</div>';
    html += '</div>';
  }
  document.getElementById('leadList').innerHTML = html;
}

function getLead(row) {
  for (var i = 0; i < leads.length; i++) { if (leads[i].row === row) return leads[i]; }
  return null;
}

function openDetail(row) {
  currentId = row;
  var l = getLead(row);
  if (!l) return;
  var idx = 0;
  for (var i = 0; i < leads.length; i++) { if (leads[i].row === row) { idx = i; break; } }
  document.getElementById('detailNav').textContent = (idx + 1) + ' of ' + leads.length;
  document.getElementById('detailView').classList.add('open');
  document.getElementById('detailView').scrollTop = 0;
  renderDetail();
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  currentId = null;
}

function renderDetail() {
  var l = getLead(currentId);
  if (!l) return;
  var mapsUrl = 'https://maps.apple.com/?q=' + encodeURIComponent(l.address + ', ' + l.city + ', ' + l.state + ' ' + l.zip);
  var firstGood = null;
  for (var i = 0; i < l.phones.length; i++) { if (!l.phones[i].dnc) { firstGood = l.phones[i]; break; } }
  var callNum = l.bestPhone || (firstGood ? firstGood.number : '');

  var phonesHtml = '';
  if (l.phones.length) {
    for (var i = 0; i < l.phones.length; i++) {
      var p = l.phones[i];
      phonesHtml += '<div class="phone-item ' + (p.dnc ? 'is-dnc' : '') + '">';
      phonesHtml += '<div><div class="phone-num">' + fmt(p.number) + (p.dnc ? '<span class="dnc-badge">DNC</span>' : '') + '</div>';
      var contactLabel = p.contact || p.type || ('Phone ' + (i+1));
      phonesHtml += '<div class="phone-sub">' + contactLabel + (p.dnc ? ' · DNC' : '') + '</div></div>';
      phonesHtml += '<div class="ph-btns">';
      phonesHtml += '<button class="ph-btn ph-call" onclick="dial(\'' + p.number + '\')">📞</button>';
      phonesHtml += '<button class="ph-btn ph-sms" onclick="openTextMenu(event, this, \'' + p.number + '\')">💬</button>';
      phonesHtml += '</div></div>';
    }
  } else {
    phonesHtml = '<div style="color:var(--muted);padding:8px 0;font-size:14px">No phones - door knock only</div>';
  }

  var statusHtml = '';
  for (var i = 0; i < STATUSES.length; i++) {
    var s = STATUSES[i];
    statusHtml += '<div class="status-opt ' + (l.status === s.key ? 'sel-' + s.key : '') + '" onclick="setStatus(\'' + s.key + '\')">' + s.label + '</div>';
  }

  var logEntries = l.notes ? l.notes.split('|||').filter(function(x){ return x.trim(); }) : [];
  var logHtml = '';
  if (logEntries.length) {
    for (var i = logEntries.length - 1; i >= 0; i--) {
      var parts = logEntries[i].split('|');
      logHtml += '<div class="log-item"><div class="log-date">' + (parts[0]||'') + '</div>';
      logHtml += '<div class="log-note">' + (parts[2]||'-') + '</div>';
      logHtml += '<div class="log-status">' + (parts[1]||'') + '</div></div>';
    }
  } else {
    logHtml = '<div style="color:var(--muted);font-size:13px;padding:4px 0">No call history yet</div>';
  }

  var textSentLabel = l.textSent ? '<span style="font-size:12px;color:#4ade80;margin-left:8px">✓ Text sent ' + (l.textSentTimestamp ? l.textSentTimestamp.split('T')[0] : '') + '</span>' : '';

  var html = '';
  html += '<div class="detail-name">' + l.name + '</div>';
  html += '<div class="detail-addr">' + l.address + '<br>' + l.city + ', ' + l.state + ' ' + l.zip + '<br><small style="color:var(--muted)">' + l.leadType + (l.source ? ' · ' + l.source : '') + '</small></div>';

  if (l.saleDate) {
    var sp = l.saleDate.split('/');
    var sts = sp.length === 3 ? new Date(sp[2], sp[0]-1, sp[1]).getTime() : 0;
    var dOut = sts ? Math.ceil((sts - Date.now()) / 86400000) : 999;
    var urgCls = dOut <= 14 ? 'nos-value urgent' : 'nos-value';
    html += '<div class="nos-info">';
    html += '<div class="nos-field"><div class="nos-label">🔨 Auction Date</div><div class="' + urgCls + '">' + l.saleDate + (dOut <= 60 ? ' · ' + dOut + ' days' : '') + '</div></div>';
    if (l.publishDate) html += '<div class="nos-field"><div class="nos-label">📋 Published</div><div class="nos-value" style="color:var(--muted)">' + l.publishDate + '</div></div>';
    if (l.minBid) html += '<div class="nos-field"><div class="nos-label">💰 Min Bid</div><div class="nos-value">$' + l.minBid + '</div></div>';
    html += '</div>';
  }

  html += '<div class="action-grid">';
  html += '<button class="action-btn btn-call" onclick="dial(\'' + callNum + '\')"><span class="icon">📞</span>Call</button>';
  html += '<button class="action-btn btn-text" onclick="openTextMenu(event, this, \'\')"><span class="icon">💬</span>Text' + (l.textSent ? ' ✓' : '') + '</button>';
  html += '<button class="action-btn btn-map" onclick="window.open(\'' + mapsUrl + '\')"><span class="icon">📍</span>Map It</button>';
  html += '<button class="action-btn btn-door" onclick="logTouch(\'door knock\')"><span class="icon">🚪</span>Door Knock</button>';
  html += '<button class="action-btn btn-mail" onclick="logTouch(\'mail sent\')"><span class="icon">✉️</span>Mail Sent</button>';
  html += '<button class="action-btn btn-card" onclick="logTouch(\'letter sent\')"><span class="icon">📄</span>Letter Sent</button>';
  html += '</div>';

  html += '<div class="section-label">Best Phone</div>';
  html += '<div class="best-row"><input class="best-input" id="bestPhoneInput" type="tel" placeholder="Confirmed best number" value="' + l.bestPhone + '"><button class="best-call" onclick="dialBest()">📞</button></div>';
  html += '<div class="section-label">All Numbers</div>' + phonesHtml;
  html += '<div class="section-label">Status</div><div class="status-grid">' + statusHtml + '</div>';
  html += '<div class="section-label">Follow-Up Date</div><input class="field-input" type="date" id="followupInput" value="' + l.followUp + '">';
  html += '<div class="section-label">Next Action</div><input class="field-input" type="text" id="nextActionInput" placeholder="e.g. Call back Thursday 2pm" value="' + l.nextAction + '">';
  html += '<div class="section-label">Call Notes</div><textarea class="field-input" id="notesInput" placeholder="Seller situation, motivation, objections..."></textarea>';
  html += '<button class="save-btn" id="saveBtn" onclick="saveDetail()">💾 Save & Log Call</button>';
  html += '<div class="section-label">Call History</div>' + logHtml;
  document.getElementById('detailBody').innerHTML = html;
}

function dial(num) { if (!num) return; window.location.href = 'tel:' + String(num).replace(/\D/g,''); }

// ── Canned text templates: dropdown inside the lead ──
// Tapping the Text button opens a menu of templates by name. Selecting one
// resolves the merge fields and opens iOS Messages pre-filled. The phone is the
// lead's best_phone_number, falling back to phone_1, unless a specific number
// was passed (the per-phone text buttons).
function openTextMenu(ev, anchor, num) {
  if (ev) ev.stopPropagation();
  var l = getLead(currentId);
  var phone = String(num || '').replace(/\D/g, '');
  if (!phone) phone = bestTextNumber(l);
  if (!phone) return;
  tmplPhone = phone;

  var html = '';
  for (var c = 0; c < TEMPLATES.length; c++) {
    html += '<div class="tmpl-head">' + TEMPLATES[c].category + '</div>';
    for (var m = 0; m < TEMPLATES[c].messages.length; m++) {
      html += '<div class="tmpl-item" onclick="pickTemplate(' + c + ',' + m + ')">' + TEMPLATES[c].category + ' ' + (m + 1) + '</div>';
    }
  }
  var menu = document.getElementById('tmplMenu');
  menu.innerHTML = html;
  document.getElementById('tmplBackdrop').classList.add('open');
  menu.classList.add('open');
  positionTextMenu(menu, anchor);
}

// Places the menu under the button, clamped to the viewport.
function positionTextMenu(menu, anchor) {
  if (!anchor) return;
  var r = anchor.getBoundingClientRect();
  var mw = menu.offsetWidth, mh = menu.offsetHeight;
  var left = Math.min(r.left, window.innerWidth - mw - 8);
  if (left < 8) left = 8;
  var top = r.bottom + 6;
  if (top + mh > window.innerHeight - 8) top = Math.max(8, r.top - mh - 6);
  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
}

// best_phone_number, then phone_1.
function bestTextNumber(l) {
  if (!l) return '';
  return String(l.bestPhone || l.phone1 || '').replace(/\D/g, '');
}

// Resolves {agent_name} from AGENT_NAME, {company_name} from COMPANY_NAME,
// {first_name} from owner_name (first word), and {address} from address_street.
function resolveTemplate(body, l) {
  body = body.split('{agent_name}').join(AGENT_NAME);
  body = body.split('{company_name}').join(COMPANY_NAME);
  var firstName = (l && l.name) ? l.name.split(' ')[0] : '';
  if (firstName) body = body.split('{first_name}').join(firstName);
  if (l && l.address) body = body.split('{address}').join(l.address);
  return body;
}

function pickTemplate(c, m) {
  var l = getLead(currentId);
  var body = resolveTemplate(TEMPLATES[c].messages[m], l);
  closeTextMenu();
  window.location.href = 'sms:' + tmplPhone + '&body=' + encodeURIComponent(body);
  if (l) {
    var ts = new Date().toISOString().split('T')[0];
    l.textSent = true;
    l.textSentTimestamp = ts;
    saveToSheet(currentId, { text_sent: 'TRUE', text_sent_timestamp: ts });
    renderDetail();
  }
}

function closeTextMenu() {
  document.getElementById('tmplBackdrop').classList.remove('open');
  document.getElementById('tmplMenu').classList.remove('open');
  tmplPhone = '';
}

function dialBest() { dial(document.getElementById('bestPhoneInput').value); }

function logTouch(type) {
  var l = getLead(currentId);
  if (!l) return;
  var now = new Date().toLocaleDateString();
  var entry = now + '|' + type + '|' + type + ' logged';
  var updated = l.notes ? l.notes + '|||' + entry : entry;
  l.notes = updated;
  saveToSheet(currentId, { notes: updated, call_status: type });
  renderDetail();
}

function setStatus(key) {
  var l = getLead(currentId);
  if (l) l.status = key;
  saveToSheet(currentId, { lead_status: key, call_status: key });
  renderDetail();
}

function saveDetail() {
  if (saving) return;
  saving = true;
  var btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving...';
  var l = getLead(currentId);
  var notes = document.getElementById('notesInput').value.trim();
  var followUp = document.getElementById('followupInput').value;
  var nextAction = document.getElementById('nextActionInput').value;
  var bestPhone = document.getElementById('bestPhoneInput').value;
  var now = new Date().toLocaleDateString();
  var entry = notes ? now + '|' + (l ? l.status : 'called') + '|' + notes : '';
  var existing = l ? l.notes : '';
  var updatedNotes = entry ? (existing ? existing + '|||' + entry : entry) : existing;
  if (l) { l.notes = updatedNotes; l.followUp = followUp; l.nextAction = nextAction; l.bestPhone = bestPhone; }
  saveToSheet(currentId, {
    notes: updatedNotes,
    call_status: l ? l.status : 'called',
    lead_status: l ? l.status : 'called',
    follow_up_date: followUp,
    next_action: nextAction,
    best_phone_number: bestPhone
  });
  btn.textContent = '✅ Saved';
  saving = false;
  setTimeout(function() { btn.textContent = '💾 Save & Log Call'; renderDetail(); }, 1500);
}

function openLookup() {
  document.getElementById('lookupModal').classList.add('open');
  document.getElementById('lookupInput').focus();
}

function closeLookup() {
  document.getElementById('lookupModal').classList.remove('open');
  document.getElementById('lookupInput').value = '';
  document.getElementById('lookupResult').innerHTML = '';
}

function doLookup() {
  var num = document.getElementById('lookupInput').value.replace(/\D/g,'');
  if (num.length < 7) { document.getElementById('lookupResult').innerHTML = ''; return; }
  var matches = [];
  for (var i = 0; i < leads.length; i++) {
    var l = leads[i];
    for (var j = 0; j < l.phones.length; j++) {
      if (String(l.phones[j].number).replace(/\D/g,'').indexOf(num) !== -1) { matches.push(l); break; }
    }
  }
  if (!matches.length) {
    document.getElementById('lookupResult').innerHTML = '<div style="color:var(--muted);font-size:14px">No match found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < matches.length; i++) {
    var l = matches[i];
    html += '<div class="lead-card" style="margin-top:8px" onclick="closeLookup();openDetail(' + l.row + ')">';
    html += '<div class="lead-name"><div class="dot ' + (DOT[l.status]||'dot-new') + '"></div>' + l.name + '</div>';
    html += '<div class="lead-meta">' + l.address + ', ' + l.city + ' ' + l.zip + '</div></div>';
  }
  document.getElementById('lookupResult').innerHTML = html;
}

renderSourcePicker();
loadLeads();
</script>

<script>
/*
  Connected app shell. This block is purely additive.
  It WRAPS the existing dialer data with a read-only adapter and adds two new
  screens (Activity, Goals). It adds NO new write path and does not touch the
  dialer's read, write, or calling behavior. The Leads tab is the existing
  dialer UI, unchanged. The new screens call ONLY DLTA.adapter.*
*/

// In-memory goal inputs. Persistence (localStorage or sheet) is a later add.
var _goalInputs = {
  targetIncome: 10000,   // monthly take-home target in dollars
  avgCommission: 8000,   // gross commission per closed deal
  splitPct: 0.7,         // your share of the gross
  workDays: 21,          // calling days per month
  dialsPerDay: 80,       // your current dial capacity per day
  contactRate: 0.25,     // assumed until live data
  apptRate: 0.30,        // assumed until live data
  closeRate: 0.20        // assumed until live data
};

window.DLTA = window.DLTA || {};
window.DLTA.adapter = {
  // Returns the already-loaded leads array. No fetch, no side effects.
  getLeads: function () {
    return (typeof leads !== 'undefined' && leads) ? leads : [];
  },
  // Computes metrics ONLY from the loaded leads array. Real numbers only.
  getMetrics: function () {
    var arr = this.getLeads();
    var total = arr.length;
    var breakdown = { new: 0, called: 0, callback: 0, appointment: 0, notinterested: 0, dnc: 0, listed: 0 };
    var worked = 0, contacted = 0, dncCount = 0, followUpsDue = 0;
    var todayMs = new Date(_todayStr()).getTime();
    for (var i = 0; i < arr.length; i++) {
      var st = arr[i].status || 'new';
      if (breakdown.hasOwnProperty(st)) breakdown[st]++;
      if (st !== 'new') worked++;
      // contacted: statuses that imply a live conversation happened.
      if (st === 'called' || st === 'callback' || st === 'appointment' || st === 'listed') contacted++;
      if (st === 'dnc') dncCount++;
      var fu = _parseDateMs(arr[i].followUp);
      if (!isNaN(fu) && fu <= todayMs) followUpsDue++;
    }
    return {
      total: total,
      worked: worked,
      workedPct: total ? Math.round(worked / total * 100) : 0,
      contacted: contacted,
      contactedPct: total ? Math.round(contacted / total * 100) : 0,
      followUpsDue: followUpsDue,
      dnc: dncCount,
      breakdown: breakdown,
      // No per-call timestamps exist in the current data, so any dials-per-day
      // time series stays a labeled placeholder rather than fabricated data.
      hasCallTimestamps: false
    };
  },
  // Goal inputs live in memory for now. Persistence is a later add.
  getGoalInputs: function () {
    var out = {};
    for (var k in _goalInputs) { if (_goalInputs.hasOwnProperty(k)) out[k] = _goalInputs[k]; }
    return out;
  },
  saveGoalInputs: function (patch) {
    if (patch) {
      for (var k in patch) {
        if (_goalInputs.hasOwnProperty(k) && typeof patch[k] === 'number' && !isNaN(patch[k])) {
          _goalInputs[k] = patch[k];
        }
      }
    }
    return this.getGoalInputs();
  }
};

// ── date helpers (local, read-only) ──
function _todayStr() {
  var d = new Date();
  var m = String(d.getMonth() + 1); if (m.length < 2) m = '0' + m;
  var day = String(d.getDate()); if (day.length < 2) day = '0' + day;
  return d.getFullYear() + '-' + m + '-' + day;
}
function _parseDateMs(s) {
  if (!s) return NaN;
  s = String(s).split('T')[0].trim();
  var iso = /^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s);
  if (iso) return new Date(+iso[1], iso[2] - 1, iso[3]).getTime();
  var us = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
  if (us) return new Date(+us[3], us[1] - 1, us[2]).getTime();
  var t = new Date(s).getTime();
  return isNaN(t) ? NaN : t;
}
function _money(n) {
  n = Math.round(n || 0);
  var neg = n < 0;
  var s = String(Math.abs(n));
  var out = '', c = 0;
  for (var i = s.length - 1; i >= 0; i--) {
    out = s.charAt(i) + out;
    if (++c % 3 === 0 && i > 0) out = ',' + out;
  }
  return (neg ? '-$' : '$') + out;
}
function _setText(id, t) { var e = document.getElementById(id); if (e) e.textContent = t; }

// ── tab bar ──
var activeScreen = 'leads';
function showTab(name) {
  activeScreen = name;
  document.getElementById('listView').style.display = (name === 'leads') ? 'block' : 'none';
  document.getElementById('activityScreen').style.display = (name === 'activity') ? 'block' : 'none';
  document.getElementById('goalsScreen').style.display = (name === 'goals') ? 'block' : 'none';
  _setNav('navLeads', name === 'leads');
  _setNav('navActivity', name === 'activity');
  _setNav('navGoals', name === 'goals');
  if (name === 'activity') renderActivity();
  if (name === 'goals') renderGoals();
  window.scrollTo(0, 0);
}
function _setNav(id, on) { var e = document.getElementById(id); if (e) e.className = 'dl-nav-btn' + (on ? ' active' : ''); }

// Infers load state from the data and the existing dialer DOM, without
// changing any dialer behavior.
function getDataState() {
  if (typeof leads !== 'undefined' && leads && leads.length > 0) return 'ready';
  var ll = document.getElementById('leadList');
  if (ll) {
    if (ll.querySelector('.error-box')) return 'error';
    if (ll.querySelector('.spinner')) return 'loading';
  }
  return 'empty';
}

// ── Activity screen ──
function _ring(pct, color, center) {
  pct = Math.max(0, Math.min(100, pct));
  var r = 34, c = 2 * Math.PI * r, off = c * (1 - pct / 100);
  return '<svg width="86" height="86" viewBox="0 0 90 90">'
    + '<circle cx="45" cy="45" r="34" fill="none" stroke="#2A2A2E" stroke-width="8"/>'
    + '<circle cx="45" cy="45" r="34" fill="none" stroke="' + color + '" stroke-width="8" stroke-linecap="round" stroke-dasharray="' + c + '" stroke-dashoffset="' + off + '" transform="rotate(-90 45 45)"/>'
    + '<text x="45" y="51" text-anchor="middle" fill="#F1F1F3" font-size="18" font-weight="800">' + center + '</text></svg>';
}

function renderActivity() {
  var body = document.getElementById('activityBody');
  if (!body) return;
  var state = getDataState();
  if (state === 'loading') { body.innerHTML = '<div class="dl-state"><div class="dl-spinner"></div>Loading metrics...</div>'; return; }
  if (state === 'error') { body.innerHTML = '<div class="dl-state">Could not load leads. Open the Leads tab and tap Retry.</div>'; return; }
  if (state === 'empty') { body.innerHTML = '<div class="dl-state">No leads loaded yet.</div>'; return; }

  var m = window.DLTA.adapter.getMetrics();
  var html = '';

  html += '<div class="dl-card"><div class="dl-card-label">Coverage</div><div class="dl-rings">';
  html += '<div class="dl-ring">' + _ring(m.workedPct, '#2D6BFF', m.workedPct + '%') + '<div class="dl-ring-label">Worked<br>' + m.worked + ' of ' + m.total + '</div></div>';
  html += '<div class="dl-ring">' + _ring(m.contactedPct, '#34C759', m.contactedPct + '%') + '<div class="dl-ring-label">Contacted<br>' + m.contacted + ' of ' + m.total + '</div></div>';
  html += '</div></div>';

  html += '<div class="dl-stat-row" style="margin-bottom:14px">';
  html += '<div class="dl-stat"><div class="dl-stat-num">' + m.total + '</div><div class="dl-stat-cap">Total leads</div></div>';
  html += '<div class="dl-stat"><div class="dl-stat-num orange">' + m.followUpsDue + '</div><div class="dl-stat-cap">Follow-ups due</div></div>';
  html += '<div class="dl-stat"><div class="dl-stat-num red">' + m.dnc + '</div><div class="dl-stat-cap">DNC</div></div>';
  html += '</div>';

  var order = [
    ['new', 'New', '#2D6BFF'],
    ['called', 'Called', '#8A8A8E'],
    ['callback', 'Callback', '#FF9F0A'],
    ['appointment', 'Appt set', '#34C759'],
    ['notinterested', 'Not interested', '#6A6A6E'],
    ['dnc', 'DNC', '#FF453A'],
    ['listed', 'Listed', '#2D6BFF']
  ];
  var max = 0;
  for (var i = 0; i < order.length; i++) { var v = m.breakdown[order[i][0]] || 0; if (v > max) max = v; }
  html += '<div class="dl-card"><div class="dl-card-label">Status breakdown</div>';
  for (var i = 0; i < order.length; i++) {
    var key = order[i][0], lab = order[i][1], col = order[i][2];
    var val = m.breakdown[key] || 0;
    var w = max ? Math.round(val / max * 100) : 0;
    html += '<div class="dl-bar-row"><div class="dl-bar-top"><span>' + lab + '</span><span>' + val + '</span></div>'
      + '<div class="dl-bar-track"><div class="dl-bar-fill" style="width:' + w + '%;background:' + col + '"></div></div></div>';
  }
  html += '</div>';

  html += '<div class="dl-card"><div class="dl-card-label">Dials per day</div>'
    + '<div class="dl-placeholder">Pending live call log. Per-call timestamps are not captured yet, so daily dial bars will appear once a live call log is connected.</div></div>';

  body.innerHTML = html;
}

// ── Goals screen ──
function _sliderCard(id, label, value, min, max, step, disp, assumed) {
  var tag = assumed ? '<span class="dl-assumed">assumed until live data</span>' : '';
  return '<div class="dl-card">'
    + '<div class="dl-slider-top"><div class="dl-slider-label">' + label + tag + '</div><div class="dl-slider-val" id="val_' + id + '">' + disp + '</div></div>'
    + '<input class="dl-range" type="range" id="sl_' + id + '" min="' + min + '" max="' + max + '" step="' + step + '" value="' + value + '" oninput="onGoalInput()">'
    + '</div>';
}

function renderGoals() {
  var body = document.getElementById('goalsBody');
  if (!body) return;
  var g = window.DLTA.adapter.getGoalInputs();
  var html = '';

  html += '<div class="dl-card" style="border-color:#2D6BFF55">'
    + '<div class="dl-card-label">Dials per day needed</div>'
    + '<div class="dl-goal-out"><div class="dl-goal-big" id="goalDials">0</div>'
    + '<div class="dl-goal-cap" id="goalDialsCap"></div>'
    + '<div id="goalBadge"></div></div>'
    + '<div class="dl-stat-row" style="margin-top:14px">'
    + '<div class="dl-stat"><div class="dl-stat-num blue" id="goalDeals">0</div><div class="dl-stat-cap">Deals per month</div></div>'
    + '<div class="dl-stat"><div class="dl-stat-num blue" id="goalProj">$0</div><div class="dl-stat-cap">Projected income</div></div>'
    + '</div></div>';

  html += _sliderCard('targetIncome', 'Monthly income target', g.targetIncome, 1000, 50000, 500, _money(g.targetIncome), false);
  html += _sliderCard('avgCommission', 'Avg commission per deal', g.avgCommission, 1000, 30000, 500, _money(g.avgCommission), false);
  html += _sliderCard('splitPct', 'Your split', Math.round(g.splitPct * 100), 10, 100, 5, Math.round(g.splitPct * 100) + '%', false);
  html += _sliderCard('workDays', 'Work days per month', g.workDays, 5, 31, 1, String(g.workDays), false);
  html += _sliderCard('dialsPerDay', 'Your dials per day capacity', g.dialsPerDay, 10, 400, 10, String(g.dialsPerDay), false);
  html += _sliderCard('contactRate', 'Contact rate', Math.round(g.contactRate * 100), 1, 100, 1, Math.round(g.contactRate * 100) + '%', true);
  html += _sliderCard('apptRate', 'Contact to appointment', Math.round(g.apptRate * 100), 1, 100, 1, Math.round(g.apptRate * 100) + '%', true);
  html += _sliderCard('closeRate', 'Appointment to deal', Math.round(g.closeRate * 100), 1, 100, 1, Math.round(g.closeRate * 100) + '%', true);

  body.innerHTML = html;
  computeGoals();
}

function onGoalInput() {
  var get = function (id) { var e = document.getElementById('sl_' + id); return e ? parseFloat(e.value) : 0; };
  var p = {
    targetIncome: get('targetIncome'),
    avgCommission: get('avgCommission'),
    splitPct: get('splitPct') / 100,
    workDays: get('workDays'),
    dialsPerDay: get('dialsPerDay'),
    contactRate: get('contactRate') / 100,
    apptRate: get('apptRate') / 100,
    closeRate: get('closeRate') / 100
  };
  window.DLTA.adapter.saveGoalInputs(p);
  _setText('val_targetIncome', _money(p.targetIncome));
  _setText('val_avgCommission', _money(p.avgCommission));
  _setText('val_splitPct', Math.round(p.splitPct * 100) + '%');
  _setText('val_workDays', String(p.workDays));
  _setText('val_dialsPerDay', String(p.dialsPerDay));
  _setText('val_contactRate', Math.round(p.contactRate * 100) + '%');
  _setText('val_apptRate', Math.round(p.apptRate * 100) + '%');
  _setText('val_closeRate', Math.round(p.closeRate * 100) + '%');
  computeGoals();
}

function computeGoals() {
  var g = window.DLTA.adapter.getGoalInputs();
  var net = g.avgCommission * g.splitPct;
  var dealsNeeded = net > 0 ? g.targetIncome / net : 0;
  var apptsNeeded = g.closeRate > 0 ? dealsNeeded / g.closeRate : 0;
  var contactsNeeded = g.apptRate > 0 ? apptsNeeded / g.apptRate : 0;
  var dialsMonth = g.contactRate > 0 ? contactsNeeded / g.contactRate : 0;
  var dialsDayNeeded = g.workDays > 0 ? dialsMonth / g.workDays : 0;

  var projDeals = g.dialsPerDay * g.workDays * g.contactRate * g.apptRate * g.closeRate;
  var projIncome = projDeals * net;
  var atGoal = g.targetIncome > 0 && projIncome >= g.targetIncome;

  _setText('goalDials', String(Math.ceil(dialsDayNeeded)));
  _setText('goalDialsCap', 'to hit ' + _money(g.targetIncome) + ' per month at your assumed rates');
  _setText('goalDeals', String(Math.round(dealsNeeded * 10) / 10));
  _setText('goalProj', _money(projIncome));

  var gd = document.getElementById('goalDials');
  if (gd) gd.style.color = atGoal ? '#34C759' : '#2D6BFF';
  var pj = document.getElementById('goalProj');
  if (pj) pj.className = 'dl-stat-num ' + (atGoal ? 'green' : 'blue');

  var badge = document.getElementById('goalBadge');
  if (badge) {
    if (atGoal) {
      badge.innerHTML = '<span class="dl-badge green">At goal with ' + g.dialsPerDay + ' dials per day</span>';
    } else {
      var gap = Math.max(0, Math.ceil(dialsDayNeeded - g.dialsPerDay));
      badge.innerHTML = '<span class="dl-badge blue">' + gap + ' more dials per day to reach goal</span>';
    }
  }
}

// Refresh Activity when the leads load completes while that tab is open.
// Read-only observer on the existing dialer list, no behavior change.
(function () {
  var t = document.getElementById('leadList');
  if (t && window.MutationObserver) {
    new MutationObserver(function () {
      if (activeScreen === 'activity') renderActivity();
    }).observe(t, { childList: true, subtree: true });
  }
})();

showTab('leads');
</script>
</body>
