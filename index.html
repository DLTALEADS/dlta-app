<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --card: #1a1a24; --border: #2a2a38;
  --accent: #2563eb; --green: #16a34a; --red: #dc2626; --yellow: #d97706;
  --text: #f1f1f3; --muted: #8888aa;
}
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
.logo span { color: var(--accent); }
.stats { font-size: 12px; color: var(--muted); }
.stats b { color: var(--text); }
.search-row { display: flex; gap: 8px; margin-bottom: 8px; }
.search-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; color: var(--text); font-size: 15px; outline: none; }
.search-input::placeholder { color: var(--muted); }
.lookup-btn { background: var(--accent); border: none; border-radius: 10px; padding: 9px 14px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
.progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.list { padding: 12px 16px 100px; }
.count-label { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.lead-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
.lead-card.dimmed { opacity: 0.45; }
.lead-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.lead-meta { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.lead-footer { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.status-pill { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.pill-new { background: #0f1a35; color: var(--accent); border: 1px solid var(--accent); }
.pill-called { background: #1a1a1a; color: #666; border: 1px solid #333; }
.pill-callback { background: #1a1200; color: var(--yellow); border: 1px solid var(--yellow); }
.pill-appointment { background: #0a1f0a; color: var(--green); border: 1px solid var(--green); }
.pill-notinterested { background: #1a1a1a; color: #555; border: 1px solid #333; }
.pill-dnc { background: #1a0808; color: var(--red); border: 1px solid var(--red); }
.pill-listed { background: #1a0a1f; color: #a855f7; border: 1px solid #a855f7; }
.followup-tag { font-size: 11px; color: var(--yellow); }
.auction-tag { font-size: 11px; color: #f87171; font-weight: 700; background: #1a0808; border: 1px solid #7f1d1d; border-radius: 8px; padding: 2px 7px; }
.auction-tag.soon { color: #fbbf24; background: #1a1200; border-color: #d97706; }
.text-sent-tag { font-size: 11px; color: #4ade80; background: #0a1f0a; border: 1px solid #16a34a44; border-radius: 8px; padding: 2px 7px; }
.nos-info { background: #0d1a0d; border: 1px solid #16a34a22; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
.nos-field { display: flex; flex-direction: column; gap: 2px; }
.nos-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.chip.dnc { border-color: #7f1d1d; color: #f87171; text-decoration: line-through; }

@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #1a0808; border: 1px solid var(--red); border-radius: 14px; padding: 20px; margin: 20px; text-align: center; }

.retry-btn { margin-top: 14px; padding: 10px 20px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }

.detail.open { display: block; }
.detail-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 10px; }
.back-btn { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text); font-size: 14px; font-weight: 700; cursor: pointer; }

.touch-row .action-btn .icon { font-size: 20px; }

.best-row { display: flex; gap: 8px; }
.best-input { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; color: var(--text); font-size: 16px; font-weight: 700; outline: none; font-family: inherit; }

.status-opt { padding: 12px 6px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; line-height: 1.4; }
.sel-new { border-color: var(--accent); color: var(--accent); background: #0f1a35; }

.field-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 15px; outline: none; font-family: inherit; }
.field-input:focus { border-color: var(--accent); }
textarea.field-input { min-height: 110px; resize: none; line-height: 1.6; }

/* Rings */

.ring { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.ring svg { width: 92px; height: 92px; }

/* Charts */
.bar-chart { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 18px; }

.goal-line { position: absolute; left: 0; right: 0; border-top: 2px dashed var(--muted); pointer-events: none; }

.day-labels { display: flex; gap: 6px; margin-top: 6px; }
.day-labels div { flex: 1; text-align: center; font-size: 11px; color: var(--muted); }
.hbar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }

/* Goals */
.goal-flabel { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
.goal-output { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--muted); }

/* Empty state */
.empty-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px 20px; text-align: center; }
.empty-title { font-weight: 800; margin-bottom: 8px; color: var(--text); }
.empty-msg { color: var(--muted); font-size: 13px; line-height: 1.5; }
</style>

<script>
var leads = [];
var activeTab = 'all';
var currentId = null;
var saving = false;
var pendingSmsNum = '';
var pendingSmsMsg = '';

var DOT = { new:'dot-new', called:'dot-called', callback:'dot-callback', appointment:'dot-appointment', notinterested:'dot-notinterested', dnc:'dot-dnc', listed:'dot-listed' };
var PILL = { new:'pill-new', called:'pill-called', callback:'pill-callback', appointment:'pill-appointment', notinterested:'pill-notinterested', dnc:'pill-dnc', listed:'pill-listed' };
var PILL_LABEL = { new:'New', called:'Called', callback:'Callback', appointment:'Appt Set', notinterested:'Not Int.', dnc:'DNC', listed:'Listed' };
var TABS = [
  { key:'all', label:'All' },
  { key:'nos', label:'🔨 NOS' },
  { key:'lp', label:'⚖️ LP' },
  { key:'new', label:'🔵 New' },
  { key:'callback', label:'🔁 Callbacks' },
  { key:'appointment', label:'📅 Appts' },
  { key:'called', label:'📞 Called' },
  { key:'listed', label:'🏠 Listed' }
];
var sortMode = 'default';
var STATUSES = [
  {key:'new',label:'🔵 New'},
  {key:'called',label:'📞 Called'},
  {key:'callback',label:'🔁 Callback'},
  {key:'appointment',label:'📅 Appt Set'},
  {key:'notinterested',label:'👎 Not Int.'},
  {key:'dnc',label:'🚫 DNC'},
  {key:'listed',label:'🏠 Listed'}
];

function normalizeStatus(raw) {
  if (!raw) return 'new';
  var s = String(raw).toLowerCase().trim();
  if (s === 'new' || s === 'not called' || s === '') return 'new';
  if (s === 'called' || s === 'contacted') return 'called';
  if (s === 'callback' || s === 'call back' || s === 'follow up') return 'callback';
  if (s === 'appointment' || s === 'appt set' || s === 'appt') return 'appointment';
  if (s === 'notinterested' || s === 'not interested' || s === 'not int') return 'notinterested';
  if (s === 'dnc' || s === 'do not call') return 'dnc';
  if (s === 'listed') return 'listed';
  return 'new';
}

// API key baked in — no gate needed

function showError(msg) {
  document.getElementById('leadList').innerHTML =
    '<div class="error-box"><h3>⚠️ Could Not Load Leads</h3><p>' + msg + '</p><button class="retry-btn" onclick="loadLeads()">Retry</button></div>';
}

function loadLeads() {
  document.getElementById('leadList').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading leads...</div></div>';
  var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + encodeURIComponent(SHEET_NAME) + '?key=' + API_KEY;
  fetch(url)
    .then(function(r) {
      if (!r.ok) return r.json().then(function(e) { throw new Error(e.error.message); });
      return r.json();
    })
    .then(function(data) {
      var rows = data.values || [];
      if (rows.length < 2) { showError('No data found in sheet.'); return; }
      var headers = rows[0];
      leads = [];
      for (var i = 1; i < rows.length; i++) {
        var row = rows[i];
        var r = {};
        for (var j = 0; j < headers.length; j++) {
          r[headers[j]] = row[j] !== undefined ? row[j] : '';
        }

        // ── PHONE PARSING — matches confirmed 45-column schema ──
        // Schema: phone_1, phone_1_contact, phone_1_type, phone_1_dnc  (×5)
        var phones = [];
        for (var j = 1; j <= 5; j++) {
          var num = String(r['phone_' + j] || '').trim().replace(/\.0$/, '');
          var dnc = String(r['phone_' + j + '_dnc'] || '').toLowerCase() === 'true';
          var contact = String(r['phone_' + j + '_contact'] || '').trim();
          var type = String(r['phone_' + j + '_type'] || '').trim();
          if (num && num !== '0') phones.push({ number: num, dnc: dnc, contact: contact, type: type });
        }

        leads.push({
          row: i + 1,
          // Join key for Espo. The adapter writes are keyed on this, not the
          // Sheet row. Mirrored back from Espo by the step-5 sync job.
          leadId: String(r.lead_id || '').trim(),
          name: String(r.owner_name || 'Unknown Owner').trim(),
          address: String(r.address_street || r.address_full || ''),
          city: String(r.address_city || r.city || ''),
          state: String(r.address_state || r.state || ''),
          zip: String(r.address_zip || r.zip || ''),
          phones: phones,
          status: normalizeStatus(r.lead_status || r.call_status),
          notes: String(r.notes || ''),
          bestPhone: String(r.best_phone_number || ''),
          followUp: String(r.follow_up_date || '').split('T')[0],
          nextAction: String(r.next_action || ''),
          source: String(r.source || ''),
          leadType: String(r.lead_type || ''),
          textSent: String(r.text_sent || '').toLowerCase() === 'true',
          textSentTimestamp: String(r.text_sent_timestamp || ''),
          // sale_date / publish_date / min_bid: present if scraper ran, blank if not
          saleDate: String(r.sale_date || ''),
          publishDate: String(r.publish_date || ''),
          minBid: String(r.min_bid || ''),
          leadCategory: String(r.lead_type || '').toUpperCase()
        });
      }
      renderTabs();
      renderList();
    })
    .catch(function(err) {
      showError(err.message || 'Failed to load. Check API key and make sure the Sheet is shared publicly (View access).');
    });
}

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHDX2GDqaGggMrXRSRntfBlsTCiOtRe1IHsEcSX2kr7XjagcE5IQJSZ1KPbJzFEc5-/exec';

// DEPRECATED as the dialer's write path. Espo is now the system of record and
// all dispositions/touches go through the adapter. Status and follow_up flow
// back to the Sheet only via the step-5 Espo -> Sheet mirror, never from here
// (one authority per field, one direction each). Left in place as the documented
// escape-hatch backup; nothing in the dialer calls it now.
function saveToSheet(row, updates) {
  var params = new URLSearchParams();
  params.append('action', 'update');
  params.append('row', row);
  params.append('updates', JSON.stringify(updates));
  fetch(APPS_SCRIPT_URL + '?' + params.toString())
    .catch(function(e) { console.error('Save error:', e); });
}

function fmt(num) {
  var d = String(num).replace(/\D/g, '');
  if (d.length < 10) return num;
  return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6,10);
}

function renderTabs() {
  var html = '';
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    html += '<div class="tab ' + (activeTab === t.key ? 'active' : '') + '" onclick="setTab(\'' + t.key + '\')">' + t.label + '</div>';
  }
  document.getElementById('tabBar').innerHTML = html;
}

function setTab(key) { activeTab = key; renderTabs(); renderList(); }

function toggleSaleSort() {
  sortMode = sortMode === 'saledate' ? 'default' : 'saledate';
  renderList();
  var btn = document.getElementById('sortBtn');
  if (btn) btn.style.background = sortMode === 'saledate' ? 'var(--red)' : 'var(--card)';
}

function renderList() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = [];
  for (var i = 0; i < leads.length; i++) {
    var l = leads[i];
    if (activeTab === 'nos' && l.leadCategory !== 'NOS') continue;
    if (activeTab === 'lp' && l.leadCategory !== 'LP') continue;
    if (activeTab !== 'all' && activeTab !== 'nos' && activeTab !== 'lp' && l.status !== activeTab) continue;
    if (q) {
      var hay = (l.name + ' ' + l.address + ' ' + l.city + ' ' + l.zip).toLowerCase();
      var phoneStr = '';
      for (var j = 0; j < l.phones.length; j++) phoneStr += l.phones[j].number + ' ';
      if (hay.indexOf(q) === -1 && phoneStr.indexOf(q) === -1) continue;
    }
    filtered.push(l);
  }
  var worked = 0;
  for (var i = 0; i < leads.length; i++) { if (leads[i].status !== 'new') worked++; }
  var pct = leads.length ? Math.round(worked / leads.length * 100) : 0;
  document.getElementById('calledCount').textContent = worked;
  document.getElementById('totalCount').textContent = leads.length;
  document.getElementById('progressFill').style.width = pct + '%';
  if (sortMode === 'saledate') {
    filtered.sort(function(a, b) {
      var parseDate = function(d) {
        if (!d) return 99999999;
        var p = d.split('/');
        return p.length === 3 ? parseInt(p[2]+p[0]+p[1]) : 99999999;
      };
      return parseDate(a.saleDate) - parseDate(b.saleDate);
    });
  }
  document.getElementById('countLabel').textContent = filtered.length + ' lead' + (filtered.length !== 1 ? 's' : '');
  if (!filtered.length) {
    document.getElementById('leadList').innerHTML = '<div class="empty">No leads found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var l = filtered[i];
    var chips = '';
    for (var j = 0; j < l.phones.length; j++) {
      var p = l.phones[j];
      chips += '<span class="chip ' + (p.dnc ? 'dnc' : '') + '">' + fmt(p.number) + '</span>';
    }
    var fu = l.followUp ? '<span class="followup-tag">📅 ' + l.followUp + '</span>' : '';
    var auctionTag = '';
    if (l.saleDate) {
      var saleParts = l.saleDate.split('/');
      var saleTs = saleParts.length === 3 ? new Date(saleParts[2], saleParts[0]-1, saleParts[1]).getTime() : 0;
      var daysOut = saleTs ? Math.ceil((saleTs - Date.now()) / 86400000) : 999;
      var tagClass = daysOut <= 14 ? 'auction-tag soon' : 'auction-tag';
      auctionTag = '<span class="' + tagClass + '">🔨 ' + l.saleDate + (daysOut <= 14 ? ' (' + daysOut + 'd)' : '') + '</span>';
    }
    var textTag = l.textSent ? '<span class="text-sent-tag">💬 Texted</span>' : '';
    var dimmed = l.status === 'notinterested' || l.status === 'dnc';
    html += '<div class="lead-card ' + (dimmed ? 'dimmed' : '') + '" onclick="openDetail(' + l.row + ')">';
    html += '<div class="lead-name"><div class="dot ' + (DOT[l.status] || 'dot-new') + '"></div>' + l.name + '</div>';
    html += '<div class="lead-meta">' + l.address + ', ' + l.city + ' ' + l.zip + '</div>';
    html += '<div class="lead-footer"><span class="status-pill ' + (PILL[l.status] || 'pill-new') + '">' + (PILL_LABEL[l.status] || 'New') + '</span>' + chips + fu + auctionTag + textTag + '</div>';
    html += '</div>';
  }
  document.getElementById('leadList').innerHTML = html;
}

function getLead(row) {
  for (var i = 0; i < leads.length; i++) { if (leads[i].row === row) return leads[i]; }
  return null;
}

function openDetail(row) {
  currentId = row;

  var idx = 0;
  for (var i = 0; i < leads.length; i++) { if (leads[i].row === row) { idx = i; break; } }
  document.getElementById('detailNav').textContent = (idx + 1) + ' of ' + leads.length;
  document.getElementById('detailView').classList.add('open');
  document.getElementById('detailView').scrollTop = 0;
  renderDetail();
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('open');
  currentId = null;
}

// Returns the Espo join key for the open lead, or null with a warning if the
// Sheet row has no lead_id yet (so writes never silently target the wrong place).
function currentLeadKey() {
  var l = getLead(currentId);
  if (!l) return null;
  if (!l.leadId) {
    console.warn('No lead_id on this row; cannot write to Espo until the row is synced.');
    return null;
  }
  return l.leadId;
}

// Every touch (Map It, Door Knock, Mail Sent, Letter Sent, Call, Text) creates
// one cCallLog event in Espo via the adapter. We also append an in-memory log
// line for immediate feedback; the Sheet is updated only by the step-5 mirror.
function logTouch(type) {
  var l = getLead(currentId);
  if (!l) return;
  var now = new Date().toLocaleDateString();
  var entry = now + '|' + type + '|' + type + ' logged';
  l.notes = l.notes ? l.notes + '|||' + entry : entry;
  var key = currentLeadKey();
  if (key && window.adapter) {
    window.adapter.logTouch(key, type).catch(function (e) { console.error('logTouch failed:', e); });
  }
  renderDetail();
}

// Call tile: log the touch, then place the call.
function callAction(num) {
  logTouch('Call');
  dial(num);
}

// Map It tile: log the touch, then open Maps.
function mapAction(url) {
  logTouch('Map It');
  window.open(url);
}

// Status is now persisted to Espo on "Save & Log Call" (via adapter.saveDisposition),
// not written to the Sheet here. Tapping a status only updates the in-memory
// selection; Save commits it. This keeps status one-directional (Espo -> Sheet).
function setStatus(key) {
  var l = getLead(currentId);
  if (l) l.status = key;
  renderDetail();
}

// "Save & Log Call" now writes the disposition to Espo through the adapter:
// it updates the Lead (status, follow-up, next action) and creates one cCallLog
// event. The Sheet is no longer written here; the step-5 mirror carries status
// and follow_up back to the Sheet for the dialer's reads.
function saveDetail() {
  if (saving) return;
  var btn = document.getElementById('saveBtn');
  var l = getLead(currentId);
  var notes = document.getElementById('notesInput').value.trim();
  var followUp = document.getElementById('followupInput').value;
  var nextAction = document.getElementById('nextActionInput').value;
  var bestPhone = document.getElementById('bestPhoneInput').value;
  var now = new Date().toLocaleDateString();
  var status = l ? l.status : 'called';
  var entry = notes ? now + '|' + status + '|' + notes : '';
  var existing = l ? l.notes : '';
  var updatedNotes = entry ? (existing ? existing + '|||' + entry : entry) : existing;
  if (l) { l.notes = updatedNotes; l.followUp = followUp; l.nextAction = nextAction; l.bestPhone = bestPhone; }

  if (!l || !l.leadId || !window.adapter) {
    btn.textContent = '⚠️ No lead_id — not saved';
    console.warn('Save skipped: missing lead_id or adapter not loaded.');
    setTimeout(function () { btn.textContent = '💾 Save & Log Call'; renderDetail(); }, 1800);
    return;
  }

  saving = true;
  btn.textContent = 'Saving...';
  window.adapter.saveDisposition(l.leadId, {
    status: status,
    followUpDate: followUp,
    nextAction: nextAction,
    notes: notes
  }).then(function () {
    btn.textContent = '✅ Saved';
  }).catch(function (e) {
    console.error('saveDisposition failed:', e);
    btn.textContent = '⚠️ Save failed';
  }).then(function () {
    saving = false;
    setTimeout(function () { btn.textContent = '💾 Save & Log Call'; renderDetail(); }, 1500);
  });
}

function closeLookup() {
  document.getElementById('lookupModal').classList.remove('open');

function doLookup() {
  var num = document.getElementById('lookupInput').value.replace(/\D/g,'');
  if (num.length < 7) { document.getElementById('lookupResult').innerHTML = ''; return; }
  var matches = [];
  for (var i = 0; i < leads.length; i++) {
    var l = leads[i];
    for (var j = 0; j < l.phones.length; j++) {
      if (String(l.phones[j].number).replace(/\D/g,'').indexOf(num) !== -1) { matches.push(l); break; }
    }
  }
  if (!matches.length) {
    document.getElementById('lookupResult').innerHTML = '<div style="color:var(--muted);font-size:14px">No match found</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < matches.length; i++) {
    var l = matches[i];
    html += '<div class="lead-card" style="margin-top:8px" onclick="closeLookup();openDetail(' + l.row + ')">';
    html += '<div class="lead-name"><div class="dot ' + (DOT[l.status]||'dot-new') + '"></div>' + l.name + '</div>';
    html += '<div class="lead-meta">' + l.address + ', ' + l.city + ' ' + l.zip + '</div></div>';
  }
  document.getElementById('lookupResult').innerHTML = html;
}

// App shell: bottom tab navigation across Leads / Activity / Goals.
// Activity and Goals read ONLY through window.adapter (getMetrics, getGoalInputs,
// saveGoalInputs); they never touch Espo directly.
// ─────────────────────────────────────────────────────────────────────────
function switchScreen(name) {
  var screens = { leads: 'listView', activity: 'activityView', goals: 'goalsView' };
  for (var key in screens) {
    if (!screens.hasOwnProperty(key)) continue;
    var el = document.getElementById(screens[key]);
    if (el) el.style.display = (key === name) ? '' : 'none';
    var nav = document.getElementById('nav-' + key);
    if (nav) nav.classList.toggle('active', key === name);
  }
  if (name === 'activity') renderActivity();
  if (name === 'goals') renderGoals();
}

// Metrics loader that degrades gracefully when Espo is not reachable yet
// (no config.js, offline, or cCallLog empty). Screens get null and show a hint.
function loadMetrics() {
  if (!window.adapter) return Promise.resolve(null);
  return window.adapter.getMetrics({}).catch(function (e) {
    console.warn('getMetrics unavailable:', e.message);
    return null;
  });
}

function loadGoalInputs() {
  if (!window.adapter) return Promise.resolve({});
  return window.adapter.getGoalInputs().catch(function () { return {}; });
}

// Shared funnel math. Lifestyle income -> closings -> leads/month -> dials/day.
// Commission is a true percent of average sale price. Contact rate and
// leads-per-dial are MEASURED from getMetrics, with fallbacks until data exists.
var FALLBACK_CONTACT_RATE = 0.30;
var FALLBACK_LEADS_PER_DIAL = 0.10;
var WORKDAYS_PER_WEEK = 5;

function computeGoals(inputs, metrics) {
  var commissionPerClosing = (Number(inputs.avgSalePrice) || 0) * (Number(inputs.commissionPercent) || 0) / 100;
  var closingsPerYear = commissionPerClosing > 0 ? (Number(inputs.lifestyleIncome) || 0) / commissionPerClosing : 0;
  var closingsPerMonth = closingsPerYear / 12;
  var leadsPerMonth = closingsPerMonth * (Number(inputs.leadsPerClosing) || 0);

  var dials = metrics ? metrics.dials : 0;
  var measuredContact = (metrics && dials > 0) ? metrics.contacts / dials : null;
  var measuredLeadsPerDial = (metrics && dials > 0) ? metrics.leads / dials : null;
  var contactRate = measuredContact != null ? measuredContact : FALLBACK_CONTACT_RATE;
  var leadsPerDial = measuredLeadsPerDial != null ? measuredLeadsPerDial : FALLBACK_LEADS_PER_DIAL;

  var dialsPerMonth = leadsPerDial > 0 ? leadsPerMonth / leadsPerDial : 0;
  var workdays = Number(inputs.workdaysPerMonth) || 20;
  var dialsPerDay = workdays > 0 ? dialsPerMonth / workdays : 0;

  return {
    commissionPerClosing: commissionPerClosing,
    closingsPerYear: closingsPerYear,
    closingsPerMonth: closingsPerMonth,
    leadsPerMonth: leadsPerMonth,
    dialsPerMonth: dialsPerMonth,
    dialsPerDay: dialsPerDay,
    contactRate: contactRate,
    leadsPerDial: leadsPerDial,
    measured: measuredContact != null
  };
}

// ── Activity screen ──
function renderActivity() {
  var body = document.getElementById('activityBody');
  body.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading activity...</div></div>';
  Promise.all([loadMetrics(), loadGoalInputs()]).then(function (res) {
    var metrics = res[0];
    var inputs = res[1] || {};
    if (!metrics) {
      body.innerHTML = emptyState('No live metrics yet',
        'Add src/data/config.js with your Espo key, then log calls and touches. Activity fills in from the cCallLog events automatically.');
      return;
    }
    var goals = computeGoals(inputs, metrics);
    var dialsTarget = Math.round(goals.dialsPerDay * WORKDAYS_PER_WEEK);
    var contactsTarget = Math.round(dialsTarget * goals.contactRate);
    var apptsTarget = Math.round(goals.leadsPerMonth / 4);

    var html = '';
    html += '<div class="rings">';
    html += ringCard('Dials', metrics.dials, dialsTarget);
    html += ringCard('Contacts', metrics.contacts, contactsTarget);
    html += ringCard('Appts', metrics.appts, apptsTarget);
    html += '</div>';
    html += weeklyDialsChart(metrics.perDay, goals.dialsPerDay);
    html += outcomeChart(metrics.outcomes);
    body.innerHTML = html;
  });
}

// Progress ring. Fills blue in progress, green at goal.
function ringCard(label, value, target) {
  var pct = target > 0 ? Math.min(value / target, 1) : 0;
  var atGoal = target > 0 && value >= target;
  var color = atGoal ? '#16a34a' : '#2563eb';
  var circ = 264;
  var offset = circ * (1 - pct);
  var s = '';
  s += '<div class="ring">';
  s += '<svg viewBox="0 0 100 100">';
  s += '<circle cx="50" cy="50" r="42" fill="none" stroke="#2a2a38" stroke-width="9"></circle>';
  s += '<circle cx="50" cy="50" r="42" fill="none" stroke="' + color + '" stroke-width="9" stroke-linecap="round" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" transform="rotate(-90 50 50)"></circle>';
  s += '<text x="50" y="57" text-anchor="middle" font-size="24" font-weight="800" fill="#f1f1f3">' + value + '</text>';
  s += '</svg>';
  s += '<div class="ring-label">' + label + '</div>';
  s += '<div class="ring-sub">of ' + target + '</div>';
  s += '</div>';
  return s;
}

// Weekly dials, one bar per day, with the daily goal as a dashed line.
function weeklyDialsChart(perDay, goalPerDay) {
  perDay = perDay || [0, 0, 0, 0, 0, 0, 0];
  var days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
  var max = Math.max.apply(null, perDay.concat([goalPerDay, 1]));
  var goalPct = Math.min(goalPerDay / max, 1) * 100;
  var bars = '';
  for (var i = 0; i < 7; i++) {
    var h = Math.round((perDay[i] / max) * 100);
    var hit = goalPerDay > 0 && perDay[i] >= goalPerDay;
    bars += '<div class="vcol"><div class="vfill' + (hit ? ' hit' : '') + '" style="height:' + h + '%"></div></div>';
  }
  var labels = '';
  for (var j = 0; j < 7; j++) labels += '<div>' + days[j] + '</div>';
  var html = '';
  html += '<div class="section-label">This Week · Dials</div>';
  html += '<div class="bar-chart">';
  html += '<div class="chart-plot">';
  html += '<div class="goal-line" style="bottom:' + goalPct + '%"><span>goal ' + Math.round(goalPerDay) + '/day</span></div>';
  html += bars;
  html += '</div>';
  html += '<div class="day-labels">' + labels + '</div>';
  html += '</div>';
  return html;
}

// Weekly outreach outcomes as horizontal bars.
function outcomeChart(outcomes) {
  outcomes = outcomes || {};
  var items = [
    ['✉️ Mail Sent', Number(outcomes['Mail Sent']) || 0],
    ['📄 Letter Sent', Number(outcomes['Letter Sent']) || 0],
    ['🚪 Door Knock', Number(outcomes['Door Knock']) || 0]
  ];
  var max = Math.max(1, items[0][1], items[1][1], items[2][1]);
  var rows = '';
  for (var i = 0; i < items.length; i++) {
    var w = Math.round((items[i][1] / max) * 100);
    rows += '<div class="hbar-row"><div class="hbar-label">' + items[i][0] + '</div>' +
            '<div class="hbar-track"><div class="hbar-fill" style="width:' + w + '%"></div></div>' +
            '<div class="hbar-val">' + items[i][1] + '</div></div>';
  }
  return '<div class="section-label">This Week · Outcomes</div><div class="bar-chart">' + rows + '</div>';
}

// ── Goals screen ──
function renderGoals() {
  Promise.all([loadMetrics(), loadGoalInputs()]).then(function (res) {
    goalsRender(res[1] || {}, res[0]);
  });
}

function goalsRender(inputs, metrics) {
  var body = document.getElementById('goalsBody');
  var g = computeGoals(inputs, metrics);
  var html = '';

  html += '<div class="section-label">Lifestyle Target</div>';
  html += goalInput('lifestyleIncome', 'Annual income you want ($)', inputs.lifestyleIncome);

  html += '<div class="section-label">Deal Economics</div>';
  html += goalInput('avgSalePrice', 'Average sale price ($)', inputs.avgSalePrice);
  html += goalInput('commissionPercent', 'Your commission (%)', inputs.commissionPercent);
  html += goalInput('leadsPerClosing', 'Leads needed per closing', inputs.leadsPerClosing);
  html += goalInput('workdaysPerMonth', 'Workdays per month', inputs.workdaysPerMonth);
  html += '<button class="save-btn" onclick="saveGoals()">💾 Save Goals</button>';

  var src = g.measured ? 'measured this week' : 'default, no data yet';
  html += '<div class="section-label">Measured Rates</div>';
  html += '<div class="goal-output"><span>Contact rate <small>(' + src + ')</small></span><b>' + pctFmt(g.contactRate) + '</b></div>';
  html += '<div class="goal-output"><span>Leads per dial <small>(' + src + ')</small></span><b>' + pctFmt(g.leadsPerDial) + '</b></div>';

  html += '<div class="section-label">Your Plan</div>';
  html += '<div class="goal-output"><span>Commission per closing</span><b>' + money(g.commissionPerClosing) + '</b></div>';
  html += '<div class="goal-output"><span>Closings per year</span><b>' + g.closingsPerYear.toFixed(1) + '</b></div>';
  html += '<div class="goal-output"><span>Closings per month</span><b>' + g.closingsPerMonth.toFixed(1) + '</b></div>';
  html += '<div class="goal-output"><span>Leads per month</span><b>' + Math.round(g.leadsPerMonth) + '</b></div>';
  html += '<div class="goal-output big"><span>Dials per day</span><b>' + Math.ceil(g.dialsPerDay) + '</b></div>';

  body.innerHTML = html;
}

function goalInput(key, label, val) {
  return '<label class="goal-flabel">' + label + '</label>' +
         '<input class="field-input" type="number" inputmode="decimal" id="goal-' + key + '" value="' + (val != null ? val : '') + '">';
}

function saveGoals() {
  var keys = ['lifestyleIncome', 'avgSalePrice', 'commissionPercent', 'leadsPerClosing', 'workdaysPerMonth'];
  var obj = {};
  for (var i = 0; i < keys.length; i++) {
    var input = document.getElementById('goal-' + keys[i]);
    obj[keys[i]] = input ? Number(input.value) : 0;
  }
  if (!window.adapter) return;
  window.adapter.saveGoalInputs(obj).then(function () { renderGoals(); });
}

// Small formatters shared by Activity and Goals.
function money(n) { return '$' + Math.round(Number(n) || 0).toLocaleString(); }
function pctFmt(r) { return (Number(r) * 100).toFixed(1) + '%'; }
function emptyState(title, msg) {
  return '<div class="empty-card"><div class="empty-title">' + title + '</div><div class="empty-msg">' + msg + '</div></div>';
}

loadLeads();
switchScreen('leads');
</script>
</body>
